<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I LOVE BIANQUITA😍</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      touch-action: none; /* evita zoom accidental al tocar */
    }
    canvas {
      display: block;
    }

    #intro-modal{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,.88);
    backdrop-filter:blur(6px);
    z-index:1000;
}

.intro-box{
    width:320px;
    padding:25px;

}

.intro-box img{
    width:170px;

}

.intro-box h2{
    color:white;
    margin:0;

}

.intro-box p{
    color:#bbb;

}

#intro-button{
    padding:14px 20px;
    font-size:20px;

    color:white;
    background:linear-gradient(135deg,#6dd5fa,#4facfe,#7ef9d1);
    border:none;
    border-radius:40px;
    cursor:pointer;
    box-shadow:0 0 20px rgba(109,213,250,.6);
    transition:.3s;
}

#intro-button:hover{
    transform:scale(1.08);
    box-shadow:0 0 30px rgba(126,249,209,.8);
}

#intro-button:active{

}

    .modal-card {
      width: min(92vw, 420px);
      padding: 18px 18px 20px;
      border-radius: 24px;
      background: rgba(15, 10, 18, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45), 0 0 80px rgba(255, 0, 90, 0.18);
      text-align: center;
    }

    .modal-card img {
      width: 100%;
      max-height: 320px;
      object-fit: cover;
      border-radius: 18px;
      display: block;
      margin-bottom: 16px;
    }

    .modal-card button {
      appearance: none;
      border: 0;
      padding: 14px 22px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff4d7d, #ff1f5f);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(255, 31, 95, 0.35);
    }

    .modal-card button:active {
      transform: translateY(1px);
    }
    #continueBtn{
    display: none;
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    padding: 16px 40px;
    font-size: 20px;
    font-weight: bold;
    color: white;
    background: linear-gradient(135deg,#6dd5fa,#4facfe,#7ef9d1);
    border: none;
    border-radius: 40px;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(109,213,250,.6);
    transition: 0.3s;
    z-index: 9999;
}

#continueBtn:hover{
    transform: translateX(-50%) scale(1.08);
}
  </style>
</head>
<button id="continueBtn" onclick="window.location.href='cosmos.html';">
    Continuar ❤️
</button>

<script>
document.addEventListener("DOMContentLoaded", function () {
    setTimeout(function () {
        document.getElementById("continueBtn").style.display = "block";
    }, 60000); // 1 minuto
});
</script>
<body>
 <div id="intro-modal">
  <div class="intro-box">
    <img src="./0992eea4e06435af58e233ce5b877541-removebg-preview (2).png" alt="">

    <h2>Toca para empezar...</h2>
    <p>Hice esto con mucho cariño para mi mechuda favorita. Espero que te guste tanto como a mí me gustó hacerlo.❤️</p>

    <button id="intro-button">
      Comenzar ✨
    </button>
  </div>
</div>

  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    let w, h;
    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    // frases románticas
    const PHRASES = [
      "Ti amo","Te quiero muchoo","Mechuda","Buebona ❤",
      "Sos mi todo loca","Te amo mechudita","Mi macha",
      "Sos mi mundo","Mi amor","Eres especial",
      "Bianquitaa","Me encantas","Te adoro ❤","Me haces muy feliz","Amor","Bianca t amo",
      "Gracias por existir","Que bonito es conocerte","posta","la chispa⚡",
      "Siempre pienso en vos",
      "Mi mechudita hermosa",
      "Mi buebona favorita",
      "Qué suerte haberte conocido",
      "Una y mil veces",
      "Nunca dejes de ser vos",
      "Nunca dejes de ser mechuda",
      "Qué lindo es tenerte",
     
    ];

    const IMAGE_SOURCES = [
      "https://i.pinimg.com/736x/db/96/d3/db96d357db3fa35fee5e03f6843f2957.jpg",
      "https://i.pinimg.com/736x/0e/e1/90/0ee1907b81c7e88278607a9fe8afbd5b.jpg",
      "https://i.pinimg.com/736x/be/6b/28/be6b282c4aa8338331a660caae22deb8.jpg",
"gato.jpg",
      "./flore.png",
      "./manita.png",
      "./abacho.png",
      "perro.png",
      //snoopys
      "https://s3.getstickerpack.com/storage/uploads/sticker-pack/snoopy/sticker_7.png?d003abb5f98a33e5a995dbb804b73f98",
      "https://s3.getstickerpack.com/storage/uploads/sticker-pack/snoopy/sticker_20.png?d340cbbaeb8a4bc6329421f73f9f27c8",
      "https://s3.getstickerpack.com/storage/uploads/sticker-pack/snoopy/sticker_19.png?6150f9357eb7afb23d8777be656a2750"
      

    ];

    const loadedImages = IMAGE_SOURCES.map(src => {
      const image = new Image();
      image.src = src;
      return image;
    });

    const texts = [];
    const stars = [];
    const hearts = [];
    const floatingImages = [];
    const tapHearts = [];
let lastTapTime = 0;

    // parámetros ajustados para CELULAR
    const MAX_ACTIVE_TEXTS = 10;
    const MAX_ACTIVE_IMAGES = 5;
    const SPAWN_INTERVAL = 700; // más rápido que antes (1.5 seg)
    const IMAGE_SPAWN_INTERVAL = 1300;
    let phraseIndex = 0;
    let offsetX = 0, offsetY = 0, zoom = 1;

    // función crear estrellas
function createStar(i,total){
  const cols=Math.ceil(Math.sqrt(total*w/h));
  const rows=Math.ceil(total/cols);
  const cw=w/cols,ch=h/rows;
  const col=i%cols,row=Math.floor(i/cols);
  return {homeX:col*cw+Math.random()*cw,homeY:row*ch+Math.random()*ch,x:col*cw+Math.random()*cw,y:row*ch+Math.random()*ch,z:Math.random()*2000+1,speed:1+Math.random()*0.5,size:(Math.random()<0.9?1:(Math.random()<0.98?2:3)),bright:Math.random()<0.03,phase:Math.random()*6.28};
}

    // corazones
    function createHeart() {
  const margin = 80;

  return {
    x: margin + Math.random() * (w - margin * 2),
    y: margin + Math.random() * (h - margin * 2),
    z: Math.random() * 1600 + 400,
    speed: 1.5 + Math.random()
  };
}

    // textos en orden
    function spawnTextInOrder(){
      if (texts.length >= MAX_ACTIVE_TEXTS) return;
      const phrase = PHRASES[Math.floor(Math.random()*PHRASES.length)];
      texts.push({
        text: phrase,
        x: Math.random() * w,
        y: Math.random() * h,
        z: Math.random() * 2200 + 80,
        speed: 1.8 + Math.random() * 1.2, // más rápido
        baseFont: (w < 600 ? 40 : 60),   // fuente clara en móvil
        glow: 25
      });
    }

    function spawnImage() {
      if (floatingImages.length >= MAX_ACTIVE_IMAGES) return;
      const imageIndex = Math.floor(Math.random() * loadedImages.length);
      floatingImages.push({
        image: loadedImages[imageIndex],
        x: Math.random() * w,
        y: Math.random() * h,
        z: Math.random() * 1600 + 300,
        speed: 1.3 + Math.random() * 0.9,
        size: (w < 600 ? 140 : 180) + Math.random() * (w < 600 ? 120 : 140),
        rotation: (Math.random()-0.5)*16,
        offset:Math.random()*100
      });
    }

    // inicializar
    const STAR_COUNT=2400; for(let i=0;i<STAR_COUNT;i++) stars.push(createStar(i,STAR_COUNT)); // más estrellas
    for (let i = 0; i < 27; i++) hearts.push(createHeart());
// Cargar algunos elementos al inicio
for (let i = 0; i < 6; i++) spawnTextInOrder();
for (let i = 0; i < 3; i++) spawnImage();
texts.forEach(t=>{t.z=700+Math.random()*900;});
floatingImages.forEach(img=>{img.z=600+Math.random()*800;});


    // animación
    function animate() {
      ctx.clearRect(0, 0, w, h);

      // estrellas
      stars.forEach(s => {
        s.z -= s.speed;
        if (s.z<=0){s.x=s.homeX;s.y=s.homeY;s.z=2000;}
        const scale=300/s.z*zoom;
        const x=(s.x-w/2+offsetX)*scale+w/2;
        const y=(s.y-h/2+offsetY)*scale+h/2;
        const size=scale*(s.size||1);
        const alpha=0.65+0.15*Math.sin((Date.now()/4000)+(s.phase||0));
        ctx.beginPath();
        ctx.arc(x,y,Math.max(size,0.6),0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${alpha})`;
        if(s.bright){ctx.shadowColor='white';ctx.shadowBlur=2;}
        ctx.fill();
        ctx.shadowBlur=0;
      });

      // textos
      texts.forEach((t, i) => {
        t.z -= t.speed;
        if (t.z <= 0) {
          texts.splice(i,1);
          return;
        }
        const scale = 250 / t.z * zoom;
        const x = (t.x - w/2 + offsetX) * scale + w/2;
        const y = (t.y - h/2 + offsetY) * scale + h/2;
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale, scale);
        ctx.font = `bold ${t.baseFont}px Arial`;
        ctx.fillStyle = "white";
        ctx.shadowColor = "white";
        ctx.shadowBlur = t.glow;
        ctx.textAlign = "center";
        ctx.fillText(t.text, 0, 0);
        ctx.restore();
      });

      // corazones
      hearts.forEach(c => {
        c.z -= c.speed;
        if (c.z <= 0) {
          c.x = Math.random() * w;
          c.y = Math.random() * h;
          c.z = 2000;
        }
        const scale = 220 / c.z * zoom;
        const x = (c.x - w/2 + offsetX) * scale + w/2;
        const y = (c.y - h/2 + offsetY) * scale + h/2;
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale*2, scale*2);
        ctx.font = "bold 28px Arial";
       const colores = [
    "#00ff99", // verde agua
    "#00ff66", // verde brillante
    "#00ffaa", // verde menta
    "#00e5ff", // celeste
    "#4fc3f7", // azul cielo
    "#81d4fa", // celeste claro
    "#26c6da", // turquesa
    "#80cbc4"  // verde azulado
];

const color = colores[Math.floor(Math.random() * colores.length)];

ctx.fillStyle = color;
ctx.shadowColor = color;
        ctx.shadowBlur = 20;
        ctx.textAlign = "center";
        ctx.fillText("❤", 0, 0);
        ctx.restore();
      });

      // imágenes
      floatingImages.forEach((item, i) => {
        item.z -= item.speed;
        if (item.z <= 0) {
          floatingImages.splice(i, 1);
          return;
        }
        const scale = 240 / item.z * zoom;
        const x = (item.x - w/2 + offsetX) * scale + w/2;
        const y = (item.y - h/2 + offsetY) * scale + h/2;
        const image = item.image;
        if (!image.complete || !image.naturalWidth) return;

        const drawSize = item.size * scale;
        ctx.save();
        const fx=x+Math.sin(Date.now()/400+item.offset)*16;
        const fy=y+Math.cos(Date.now()/500+item.offset)*16;
        ctx.translate(fx, fy);
        ctx.rotate((item.rotation||0)*Math.PI/180);
    const sombras = [
    "rgba(0,255,153,0.8)",   // verde agua
    "rgba(0,229,255,0.8)",   // celeste
    "rgba(38,198,218,0.8)",  // turquesa
    "rgba(129,212,250,0.8)"  // azul cielo
];

ctx.shadowColor = sombras[Math.floor(Math.random() * sombras.length)];
ctx.shadowBlur = 30;
        ctx.drawImage(image, -drawSize / 2, -drawSize / 2, drawSize, drawSize);
        ctx.restore();
      });
for (let i = tapHearts.length - 1; i >= 0; i--) {

    const h = tapHearts[i];

    h.x += h.vx;
    h.y += h.vy;

    h.vy += 0.05;
    h.life -= 0.02;

    ctx.save();

    ctx.globalAlpha = h.life;
    ctx.fillStyle = h.color;
    ctx.shadowColor = h.color;
    ctx.shadowBlur = 20;
    ctx.font = `bold ${h.size}px Arial`;
    ctx.textAlign = "center";

    ctx.fillText("❤", h.x, h.y);

    ctx.restore();

    if (h.life <= 0) {
        tapHearts.splice(i, 1);
    }

}
      requestAnimationFrame(animate);
    }
function createTapHearts(x, y) {

    const colors = [
        "#00ff99",
        "#00ff66",
        "#00ffaa",
        "#00e5ff",
        "#4fc3f7",
        "#81d4fa",
        "#26c6da",
        "#80cbc4"
    ];

    for (let i = 0; i < 16; i++) {

        const angle = Math.random() * Math.PI * 2;
        const speed = 4 + Math.random() * 3;

        tapHearts.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            size: 20 + Math.random() * 8,
            color: colors[Math.floor(Math.random() * colors.length)]
        });

    }

}
    animate();
    setInterval(spawnTextInOrder, SPAWN_INTERVAL);
    setInterval(spawnImage, IMAGE_SPAWN_INTERVAL);

    // controles para mouse y dedo
    const activePointers = new Map();
    let lastDragX = 0;
    let lastDragY = 0;
    let lastPinchDistance = 0;

    function updatePinchZoom() {
      if (activePointers.size !== 2) {
        lastPinchDistance = 0;
        return;
      }

      const points = [...activePointers.values()];
      const dx = points[0].x - points[1].x;
      const dy = points[0].y - points[1].y;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (lastPinchDistance) {
        zoom *= distance / lastPinchDistance;
        zoom = Math.min(Math.max(0.5, zoom), 3);
      }

      lastPinchDistance = distance;
    }

    canvas.addEventListener("pointerdown", e => {
      const now = Date.now();

if (now - lastTapTime < 300) {
    createTapHearts(e.clientX, e.clientY);
}

lastTapTime = now;
      canvas.setPointerCapture(e.pointerId);
      activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY, type: e.pointerType });

      if (activePointers.size === 1) {
        lastDragX = e.clientX;
        lastDragY = e.clientY;
      }

      updatePinchZoom();
    });

    canvas.addEventListener("pointermove", e => {
      if (!activePointers.has(e.pointerId)) return;

      activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY, type: e.pointerType });

      if (activePointers.size === 1) {
        offsetX += (e.clientX - lastDragX) / 3;
        offsetY += (e.clientY - lastDragY) / 3;
        lastDragX = e.clientX;
        lastDragY = e.clientY;
        return;
      }

      if (activePointers.size === 2) {
        updatePinchZoom();
      }
    });

    function endPointer(e) {
      activePointers.delete(e.pointerId);
      if (activePointers.size < 2) {
        lastPinchDistance = 0;
      }
      if (activePointers.size === 1) {
        const remaining = activePointers.values().next().value;
        lastDragX = remaining.x;
        lastDragY = remaining.y;
      }
    }

    canvas.addEventListener("pointerup", endPointer);
    canvas.addEventListener("pointercancel", endPointer);
    canvas.addEventListener("pointerleave", e => {
      if (e.pointerType === "mouse") {
        endPointer(e);
      }
    });

    const introModal = document.getElementById("intro-modal");
    const introButton = document.getElementById("intro-button");

    function closeIntroModal() {
      introModal.style.display = "none";
    }

    introButton.addEventListener("click", closeIntroModal);
  </script>

  <audio id="bg-music" loop>
  <source src="truelove.MP3" type="audio/mpeg">

<script>
const music = document.getElementById("bg-music");
const musicSource = "./truelove";
const musicStartSeconds = 76;

music.addEventListener("loadedmetadata", () => {
  const currentSource = music.querySelector("source")?.src || "";
  music.currentTime = currentSource === musicSource ? musicStartSeconds : 0;
});

document.body.addEventListener("click", () => {
  music.play();
}, { once:true });

document.body.addEventListener("touchstart", () => {
  music.play();
}, { once:true });


</script>

    }
